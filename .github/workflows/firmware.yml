name: Firmware (QEMU end-to-end)

# Builds the FreeRTOS QEMU demo that links firmware/trace_shim.c and boots it on
# an emulated Cortex-M3, then asserts the host parser accepts the UART output.
# This is the continuously-verified proof that the firmware side emits the
# protocol the Python tool consumes.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  qemu-e2e:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Install ARM toolchain + QEMU
      # Ubuntu splits the C library out of gcc-arm-none-eabi; libnewlib provides
      # the newlib/newlib-nano specs (nano.specs, nosys.specs) the build needs.
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          gcc-arm-none-eabi libnewlib-arm-none-eabi qemu-system-arm

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.12'

    - name: Install host package (for the parser used by the verifier)
      run: |
        python -m pip install --upgrade pip
        pip install .

    - name: Build + verify QEMU FreeRTOS demo
      working-directory: firmware/qemu-demo
      run: |
        make verify QEMU=qemu-system-arm
