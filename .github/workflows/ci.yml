name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      # Install from pyproject (the single source of truth) — this also
      # validates that the setuptools/PEP 621 packaging actually resolves.
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Run tests with coverage
      run: |
        python -m pytest -v \
          --cov=freertos_visualizer \
          --cov-report=term-missing \
          --cov-report=xml

    - name: Coverage summary
      if: always()
      run: |
        python -m coverage report >> "$GITHUB_STEP_SUMMARY" || true

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: freertos-visualizer
        fail_ci_if_error: false
