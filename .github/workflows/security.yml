name: Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 1'  # weekly, Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install Bandit
        run: python -m pip install --upgrade pip bandit
      - name: Run Bandit on the package
        run: bandit -r freertos_visualizer

  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit dependencies
        # Blocking: a known CVE in a dependency fails the build. To temporarily
        # accept a specific advisory while a fix lands, add `--ignore-vuln <ID>`.
        run: pip-audit -r requirements.txt
